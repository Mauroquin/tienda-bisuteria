services:
  - type: web
    name: aura-backend
    env: docker
    repo: https://github.com/Mauroquin/tienda-bisuteria
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: aura-mysql
          property: host
      - key: DB_USER
        fromDatabase:
          name: aura-mysql
          property: user
      - key: DB_PASS
        fromDatabase:
          name: aura-mysql
          property: password
      - key: DB_NAME
        fromDatabase:
          name: aura-mysql
          property: database
      - key: DB_PORT
        fromDatabase:
          name: aura-mysql
          property: port
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: WHATSAPP_BUSINESS
        value: "573146178265"
      - key: BASE_URL
        value: https://aura-backend.onrender.com
      - key: CORS_ORIGIN
        value: https://aura-artesanal.onrender.com

  - type: web
    name: aura-frontend
    env: static
    repo: https://github.com/Mauroquin/tienda-bisuteria
    buildCommand: npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://aura-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: aura-mysql
    databaseName: tienda_bisuteria
    user: bisuteria
    plan: free
